<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Submission Complete</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: "Avenir Next", "Segoe UI", sans-serif;
      color: #1f2b24;
      background:
        radial-gradient(circle at top left, rgba(226, 180, 76, 0.26), transparent 30%),
        radial-gradient(circle at top right, rgba(47, 125, 98, 0.18), transparent 28%),
        linear-gradient(180deg, #f6ecdb 0%, #f4f0ea 45%, #eef3ef 100%);
    }

    .card {
      width: min(560px, calc(100vw - 32px));
      padding: 32px;
      border-radius: 24px;
      background: rgba(255, 255, 255, 0.9);
      box-shadow: 0 18px 60px rgba(95, 61, 36, 0.12);
      text-align: center;
    }

    h1 {
      font-family: Georgia, "Times New Roman", serif;
      font-size: clamp(2rem, 4vw, 3rem);
      margin: 0 0 12px;
    }

    p {
      margin: 10px 0;
      line-height: 1.6;
      color: #5e675f;
    }

    .pill {
      display: inline-block;
      margin-top: 10px;
      padding: 8px 12px;
      border-radius: 999px;
      background: rgba(47, 125, 98, 0.12);
      color: #2f7d62;
      font-weight: 700;
    }

    .actions {
      margin-top: 22px;
      display: flex;
      justify-content: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .btn {
      display: inline-block;
      padding: 12px 18px;
      border-radius: 999px;
      text-decoration: none;
      font-weight: 700;
      border: 1px solid rgba(31, 43, 36, 0.08);
    }

    .btn.primary {
      background: linear-gradient(135deg, #2f7d62, #3d9978);
      color: #fffaf2;
      border: none;
    }

    .btn.secondary {
      background: rgba(255, 255, 255, 0.92);
      color: #1f2b24;
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>Submission Complete</h1>
    <p>Thank you for completing the questionnaire.</p>
    <p>Your responses have been submitted successfully.</p>
    <p class="pill" id="participantLine">Participant recorded</p>
    <div class="actions">
      <a class="btn primary" href="./questionnaire.html">Submit Another Response</a>
      <a class="btn secondary" href="./">Back to Home</a>
    </div>
  </main>

  <script>
    const params = new URLSearchParams(window.location.search);
    const participant = params.get("participant");
    const submittedAt = params.get("submittedAt");
    const line = document.getElementById("participantLine");

    if (participant && submittedAt) {
      line.textContent = `Participant ${participant} submitted at ${submittedAt}`;
    } else if (participant) {
      line.textContent = `Participant ${participant} recorded`;
    }
  </script>
</body>
</html>
